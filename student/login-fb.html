<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Élève - LTD Firebase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 500px; margin-top: 100px;">
        <div class="card">
            <div class="card-header text-center">
                <h3><i class="fas fa-user-graduate"></i> Portail Élève (Firebase)</h3>
                <p>Consultez vos résultats en temps réel</p>
            </div>
            <div class="card-body">
                <div id="errorBox" style="display:none; background: #ffeaea; color: var(--danger); padding: 10px; border-radius: 5px; margin-bottom: 20px;"></div>

                <form id="studentLoginForm">
                    <div class="form-group mb-4">
                        <label>Numéro de Matricule</label>
                        <input type="text" id="matricule" placeholder="Ex: LTD-2024-0001" required 
                               style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px;">
                    </div>
                    <div class="form-group mb-4">
                        <label>Clé Secrète (Mot de passe)</label>
                        <input type="password" id="password" placeholder="••••••••" required 
                               style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px;">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                        <i class="fas fa-sign-in-alt"></i> Se Connecter
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="../login-fb.html" class="text-primary" style="font-size: 0.9rem;">Accès Administration</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { query, collection, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { db } from '../js/firebase-config.js';

        const form = document.getElementById('studentLoginForm');
        const errorBox = document.getElementById('errorBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const matricule = document.getElementById('matricule').value;
            const password = document.getElementById('password').value;

            // Simple Firestore check (In production, use secure comparison)
            const q = query(collection(db, "eleves"), where("matricule", "==", matricule), where("password", "==", password));
            const snap = await getDocs(q);

            if (!snap.empty) {
                const student = snap.docs[0];
                localStorage.setItem('ltd_student_id', student.id);
                localStorage.setItem('ltd_student_name', student.data().prenom + " " + student.data().nom);
                window.location.href = 'dashboard-fb.html';
            } else {
                errorBox.textContent = "Matricule ou clé incorrecte.";
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
