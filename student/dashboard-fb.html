<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Notes - LTD Firebase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar-container">
        <div class="navbar-wrapper">
            <a href="dashboard-fb.html" class="navbar-logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="logo-text"><span class="logo-title">Espace Élève</span></div>
            </a>
            <div class="user-profile">
                <span id="studentName">Chargement...</span>
                <button onclick="localStorage.clear(); location.href='login-fb.html'" class="btn btn-primary btn-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-star"></i> Mes Notes & Résultats (Live)</h1>
        </div>

        <div class="card">
            <div class="card-header"><h6>Récapitulatif des notes</h6></div>
            <div class="card-body">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Trimestre</th>
                                <th>Matière</th>
                                <th>Type</th>
                                <th>Note /20</th>
                            </tr>
                        </thead>
                        <tbody id="notesTableBody">
                            <tr><td colspan="4" class="text-center">Aucune note disponible.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { getNotesByStudent } from '../js/firebase-db.js';

        const studentId = localStorage.getItem('ltd_student_id');
        const studentName = localStorage.getItem('ltd_student_name');

        if (!studentId) {
            window.location.href = 'login-fb.html';
        }

        document.getElementById('studentName').textContent = studentName;

        // Fetch notes in real-time
        getNotesByStudent(studentId, (notes) => {
            const tbody = document.getElementById('notesTableBody');
            tbody.innerHTML = '';

            if (notes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">Aucune note pour le moment.</td></tr>';
                return;
            }

            notes.forEach(note => {
                const tr = document.createElement('tr');
                const scoreColor = note.note >= 10 ? 'var(--success)' : 'var(--danger)';
                tr.innerHTML = `
                    <td>${note.trimestre}</td>
                    <td>Note Matière</td> 
                    <td>${note.typeNote === 'classe' ? 'Devoir' : 'Composition'}</td>
                    <td style="font-weight: bold; color: ${scoreColor}">${parseFloat(note.note).toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
